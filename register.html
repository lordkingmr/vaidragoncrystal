<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register VAI</title>

<style>
body{
background:#050816;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111b3d;
padding:30px;
width:350px;
border-radius:15px;
border:2px solid cyan;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:cyan;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>💎 Register VAI</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">
Daftar
</button>



</script>
</div>

<script>

function register(){

alert("REGISTER BERJALAN");

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

localStorage.setItem("username",user);
localStorage.setItem("password",pass);

alert(user);
alert(pass);
alert("Akun Berhasil Dibuat");

window.location.href="member.html";

}

</script>

</script>

</body>
</html>
