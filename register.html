<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register VAI</title>

<style>
body{
background:#050816;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111b3d;
padding:30px;
width:350px;
border-radius:15px;
border:2px solid cyan;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:cyan;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>💎 Register VAI</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">
Daftar
</button>



</script>
</div>

<script>

function register(){

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

let users =
JSON.parse(
localStorage.getItem("users")
) || {};

if(users[user]){

alert("Username sudah ada");
return;

}

users[user] = {

password: pass,
crystal: 1000

};

localStorage.setItem(
"users",
JSON.stringify(users)
);

alert("Akun berhasil dibuat");

window.location.href =
"login.html";

}

</script>

</script>

</body>
</html>
